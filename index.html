<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:#111827;
    color:white;
}

canvas{
    display:block;
    margin:auto;
    background:#1e293b;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:22px;
}

#questionBox{
    position:absolute;
    top:10px;
    right:10px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.answerBtn{
    margin-top:10px;
    display:block;
    width:180px;
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

.answerBtn:hover{
    transform:scale(1.05);
}

#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#startScreen button{
    padding:15px 30px;
    font-size:24px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>⚔️ Math Adventure ⚔️</h1>
    <p>Skákej přes překážky a počítej příklady.</p>
    <button onclick="startGame()">HRÁT</button>
</div>

<div id="ui">
⭐ Score: <span id="score">0</span><br>
❤️ Lives: <span id="lives">5</span><br>
🏆 Level: <span id="level">1</span>
</div>

<div id="questionBox">
<div id="question">5 + 5</div>

<button class="answerBtn" id="a0"></button>
<button class="answerBtn" id="a1"></button>
<button class="answerBtn" id="a2"></button>
</div>

<canvas id="game" width="1200" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameStarted = false;

let score = 0;
let lives = 5;
let level = 1;

const player = {
    x:100,
    y:450,
    width:50,
    height:50,
    color:"cyan",
    velocityY:0,
    jumping:false
};

let gravity = 0.8;

let obstacles = [];

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    gameStarted = true;
    generateQuestion();
    update();
}

function createObstacle(){
    obstacles.push({
        x:canvas.width,
        y:470,
        width:40,
        height:80,
        speed:6 + level
    });
}

setInterval(()=>{
    if(gameStarted){
        createObstacle();
    }
},1800);

function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawGround(){
    ctx.fillStyle = "#22c55e";
    ctx.fillRect(0,520,canvas.width,80);
}

function drawObstacles(){

    ctx.fillStyle = "red";

    for(let i=0;i<obstacles.length;i++){

        let o = obstacles[i];

        ctx.fillRect(o.x,o.y,o.width,o.height);

        o.x -= o.speed;

        if(
            player.x < o.x + o.width &&
            player.x + player.width > o.x &&
            player.y < o.y + o.height &&
            player.y + player.height > o.y
        ){

            obstacles.splice(i,1);

            damagePlayer();
        }

        if(o.x + o.width < 0){
            obstacles.splice(i,1);
            score += 2;
            updateUI();
        }
    }
}

function damagePlayer(){

    lives--;

    player.color = "orange";

    setTimeout(()=>{
        player.color = "cyan";
    },300);

    updateUI();

    if(lives <= 0){
        gameOver();
    }
}

function update(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawGround();

    player.velocityY += gravity;
    player.y += player.velocityY;

    if(player.y > 450){
        player.y = 450;
        player.velocityY = 0;
        player.jumping = false;
    }

    drawPlayer();
    drawObstacles();

    requestAnimationFrame(update);
}

window.addEventListener("keydown",(e)=>{

    if(e.code === "Space" && !player.jumping){

        player.velocityY = -16;
        player.jumping = true;
    }
});

let correctAnswer = 0;

function generateQuestion(){

    let a = Math.floor(Math.random()*20)+1;
    let b = Math.floor(Math.random()*20)+1;

    let ops = ["+","-","*"];

    let op = ops[Math.floor(Math.random()*ops.length)];

    let result;

    if(op === "+") result = a+b;
    if(op === "-") result = a-b;
    if(op === "*") result = a*b;

    document.getElementById("question").innerText =
        `${a} ${op} ${b} = ?`;

    correctAnswer = Math.floor(Math.random()*3);

    for(let i=0;i<3;i++){

        let value;

        if(i === correctAnswer){
            value = result;
        }else{
            value = result + Math.floor(Math.random()*20)-10;
        }

        const btn = document.getElementById("a"+i);

        btn.innerText = value;

        btn.onclick = ()=> chooseAnswer(i);
    }
}

function chooseAnswer(index){

    if(index === correctAnswer){

        score += 10;

        player.color = "lime";

        setTimeout(()=>{
            player.color = "cyan";
        },300);

    }else{

        damagePlayer();
    }

    if(score > level * 100){

        level++;

        updateUI();
    }

    generateQuestion();

    updateUI();
}

function updateUI(){

    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
    document.getElementById("level").innerText = level;
}

function gameOver(){

    alert("Konec hry! Score: " + score);

    location.reload();
}

</script>

</body>
</html>
