<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#0f172a, #111827);
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
  margin: auto;
  background: #1e293b;
  border: 4px solid white;
}

.ui {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 24px;
}

.question {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 15px;
  font-size: 24px;
}

.answers {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.answer {
  background: #2563eb;
  padding: 20px 35px;
  border-radius: 15px;
  font-size: 28px;
  cursor: pointer;
  transition: 0.2s;
}
