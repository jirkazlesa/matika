<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Battle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 900px;
      max-width: 95%;
      background: rgba(255,255,255,0.06);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .battle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .character {
      text-align: center;
    }

    .emoji {
      font-size: 120px;
    }

    .hp-bar {
      width: 100%;
      height: 25px;
      background: #333;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .hp {
      height: 100%;
      width: 100%;
      background: limegreen;
      transition: 0.4s;
    }

    .question-box {
      margin-top: 30px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
    }

    #question {
      font-size: 38px;
      margin-bottom: 20px;
    }

    input {
      width: 220px;
      padding: 15px;
      font-size: 24px;
      border: none;
      border-radius: 12px;
      text-align: center;
    }

    button {
      margin-left: 10px;
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #message {
      margin-top: 20px;
      font-size: 24px;
      min-height: 30px;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .difficulty button {
      background: #8b5cf6;
      margin: 5px;
    }

    @media (max-width: 700px) {
      .battle {
        grid-template-columns: 1fr;
      }

      .emoji {
        font-size: 90px;
      }

      #question {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ Math

    <div class="top-bar">
      <div>⭐ Body: <span id="points">0</span></div>
      <div>⏱️ Čas: <span id="timer">60</span>s</div>
    </div>

    <div class="battle">
      <div class="character">
        <div class="emoji">🧙</div>
        <h2>Ty</h2>
        <div class="hp-bar">
          <div class="hp" id="playerHP"></div>
        </div>
      </div>

      <div class="character">
        <div class="emoji">👹</div>
        <h2>Boss</h2>
        <div class="hp-bar">
          <div class="hp" id="enemyHP"></div>
        </div>
      </div>
    </div>

    <div class="question-box">
      <div id="question">7 + 8</div>

      <input type="number" id="answer" placeholder="Výsledek">
      <button onclick="checkAnswer()">Attack</button>

      <div id="message"></div>
    </div>

    <div class="controls difficulty">
      <button onclick="setDifficulty('easy')">Easy</button>
      <button onclick="setDifficulty('medium')">Medium</button>
      <button onclick="setDifficulty('hard')">Hard</button>
    </div>
  </div>

  <script>
    let num1;
    let num2;
    let correct;
    let operation;

    let points = 0;
    let playerHealth = 100;
    let enemyHealth = 100;
    let maxNumber = 20;

    let timeLeft = 60;

    const timer = setInterval(() => {
      timeLeft--;
      document.getElementById('timer').innerText = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        endGame();
      }
    }, 1000);

    function setDifficulty(level) {
      if(level === 'easy') maxNumber = 20;
      if(level === 'medium') maxNumber = 80;
      if(level === 'hard') maxNumber = 200;

      generateQuestion();
    }

    function generateQuestion() {
      num1 = Math.floor(Math.random() * maxNumber) + 1;
      num2 = Math.floor(Math.random() * maxNumber) + 1;

      const operations = ['+', '-', '*', '/'];
      operation = operations[Math.floor(Math.random() * operations.length)];

      if(operation === '+') correct = num1 + num2;
      if(operation === '-') correct = num1 - num2;
      if(operation === '*') correct = num1 * num2;

      if(operation === '/') {
        correct = num1;
        num2 = Math.floor(Math.random() * 12) + 1;
        num1 = correct * num2;
        correct = num1 / num2;
      }

      document.getElementById('question').innerText = `${num1} ${operation} ${num2}`;

      if(Math.random() < 0.25) {
        const x = Math.floor(Math.random() * 15) + 1;
        const result = x * 3 + 7;
        correct = x;
        document.getElementById('question').innerText = `x • 3 + 7 = ${result}`;
      }

      if(Math.random() < 0.15) {
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        correct = a + b;
        document.getElementById('question').innerText = `(a + ${b}) pro a = ${a}`;
      };
      document.getElementById('answer').value = '';
    }

    function checkAnswer() {
      const answer = Number(document.getElementById('answer').value);
      const message = document.getElementById('message');

      if(answer === correct) {
        enemyHealth -= 10;
        points += 5;
        message.innerText = '🔥 Kritický zásah!';
      } else {
        playerHealth -= 10;
        message.innerText = `❌ Špatně! Bylo to ${correct}`;
      }

      if(enemyHealth < 0) enemyHealth = 0;
      if(playerHealth < 0) playerHealth = 0;

      updateBars();

      document.getElementById('points').innerText = points;

      if(enemyHealth <= 0) {
        message.innerText = '🏆 Vyhrál jsi!';
        enemyHealth = 100;
      }

      if(playerHealth <= 0) {
        message.innerText = '💀 Prohrál jsi!';
        playerHealth = 100;
      }

      setTimeout(generateQuestion, 700);
    }

    function updateBars() {
      document.getElementById('playerHP').style.width = playerHealth + '%';
      document.getElementById('enemyHP').style.width = enemyHealth + '%';
    }

    function endGame() {
      document.querySelector('.question-box').innerHTML = `
        <h2>⏰ Konec hry!</h2>
        <p>Tvoje skóre: ${points}</p>
        <button onclick="location.reload()">Hrát znovu</button>
      `;
    }

    generateQuestion();
  </script>
</body>
</html>
