<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pravda / Nepravda</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f0f0;
}
.card {
    background: white;
    padding: 20px;
    margin: 50px auto;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 0 10px gray;
}
button {
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>🎯 Pravda / Nepravda</h1>

<div class="card">
    <h2 id="question">Načítám...</h2>
    <button onclick="answer(true)">Pravda</button>
    <button onclick="answer(false)">Nepravda</button>
    <p id="score">Skóre: 0</p>
</div>

<script>
let score = 0;

let questions = [
    {q: "Praha je hlavní město ČR", a: true},
    {q: "Slunce je planeta", a: false},
    {q: "9 × 9 = 81", a: true},
    {q: "V ČR je moře", a: false},
    {q: "H₂O je voda", a: true}
];

let current = 0;

function showQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerText = "Konec hry 🎉";
        return;
    }
    document.getElementById("question").innerText = questions[current].q;
}

function answer(userAnswer){
    if(current >= questions.length) return;

    if(userAnswer === questions[current].a){
        score++;
    }

    current++;
    document.getElementById("score").innerText = "Skóre: " + score;
    showQuestion();
}

showQuestion();
</script>

</body>
</html>
