<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Matematická válka</title>

<style>
body{
font-family:Arial;
background:#0b0f14;
color:white;
text-align:center;
margin:0;
}

h1{color:#00ff99}

.card{
background:#151c27;
padding:20px;
margin:20px auto;
max-width:500px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

button{
cursor:pointer;
background:#00ff99;
border:none;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.bar{
width:300px;
height:20px;
background:#333;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:red;
width:100%;
transition:0.2s;
}
</style>
</head>

<body>

<h1>⚔️ MATEMATICKÁ VÁLKA</h1>

<div class="card">
<h2>Trénink</h2>

<div id="task"></div>

<input id="ans">
<button onclick="check()">Odpovědět</button>

<p id="msg"></p>

<div class="stats">
<div>💥 Síla: <span id="power">0</span></div>
<div>🔫 Munice: <span id="ammo">0</span></div>
</div>
</div>

<div class="card" id="bossCard" style="display:none">
<h2>👹 BOS: HLAVNÍ PROGRAM</h2>

<div class="bar">
<div class="fill" id="bossHP"></div>
</div>

<p>Útoč pomocí správných odpovědí!</p>
</div>

<script>

let a,b,correct;
let power=0;
let ammo=0;

let bossHP=100;

function newTask(){
a=Math.floor(Math.random()*10+1);
b=Math.floor(Math.random()*10+1);
correct=a+b;

document.getElementById("task").innerText=
`Spočítej: ${a} + ${b}`;
}

function check(){
let v=Number(document.getElementById("ans").value);

if(v===correct){
power+=5;
ammo+=2;

document.getElementById("msg").innerText="✔ Správně! +síla +munice";

if(bossHP<100){
bossHP-=5;
updateBoss();
}

}else{
document.getElementById("msg").innerText="❌ Špatně";
}

document.getElementById("power").innerText=power;
document.getElementById("ammo").innerText=ammo;

document.getElementById("ans").value="";
newTask();

if(power>=20){
startBoss();
}
}

function startBoss(){
document.getElementById("bossCard").style.display="block";
}

function updateBoss(){
document.getElementById("bossHP").style.width=bossHP+"%";

if(bossHP<=0){
alert("👑 BOS PORAŽEN!");
location.reload();
}
}

// bonus: automatický útok
setInterval(()=>{
if(bossHP<100 && ammo>0){
bossHP-=2;
ammo--;
document.getElementById("ammo").innerText=ammo;
updateBoss();
}
},2000);

newTask();

</script>

</body>
</html>
