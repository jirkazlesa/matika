<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matematická hra</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2d2d44);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    #question {
      font-size: 28px;
      margin: 20px 0;
    }

    input {
      width: 80%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #45a049;
    }

    #result {
      margin-top: 15px;
      font-size: 20px;
    }

    #score {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>🧠 Matyka Game</h1>

    <div id="question">5 + 3</div>

    <input type="number" id="answer" placeholder="Napiš výsledek">
    <br>
    <button onclick="checkAnswer()">Potvrdit</button>

    <div id="result"></div>
    <div id="score">Skóre: 0</div>
  </div>

  <script>
    let num1;
    let num2;
    let correct;
    let score = 0;

    function generateQuestion() {
      num1 = Math.floor(Math.random() * 20);
      num2 = Math.floor(Math.random() * 20);

      const operations = ['+', '-', '*'];
      const operation = operations[Math.floor(Math.random() * operations.length)];

      if (operation === '+') {
        correct = num1 + num2;
      }

      if (operation === '-') {
        correct = num1 - num2;
      }

      if (operation === '*') {
        correct = num1 * num2;
      }

      document.getElementById('question').innerText = `${num1} ${operation} ${num2}`;
      document.getElementById('answer').value = '';
    }

    function checkAnswer() {
      const userAnswer = Number(document.getElementById('answer').value);
      const result = document.getElementById('result');

      if (userAnswer === correct) {
        result.innerText = '✅ Správně!';
        score++;
      } else {
        result.innerText = `❌ Špatně! Správná odpověď byla ${correct}`;
      }

      document.getElementById('score').innerText = `Skóre: ${score}`;

      setTimeout(generateQuestion, 1000);
    }

    generateQuestion();
  </script>
</body>
</html>
